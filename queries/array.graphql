query ArrayStatus {
  array {
    id
    state
    capacity {
      kilobytes { free used total }
      disks { free used total }
    }
    parityCheckStatus {
      status progress speed errors correcting paused running
    }
    disks {
      id idx name device size status type fsSize fsFree fsUsed fsType temp numErrors
    }
    parities {
      id idx name device size status type fsType temp numErrors
    }
    caches {
      id idx name device size status type fsSize fsFree fsUsed fsType
    }
  }
}
